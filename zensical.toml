[project]
site_name = "GenomeSpy Docs"
site_url = "https://genomespy.app/docs/"
repo_url = "https://github.com/genome-spy/genome-spy"
edit_uri = "edit/master/docs/"
extra_javascript = [{ path = "app/index.js", type = "module" }]
extra_css = ["stylesheets/extra.css"]
nav = [
    { "Introduction" = "index.md" },
    { "Getting Started" = "getting-started.md" },
    { "Visualization Grammar" = [
        "grammar/index.md",
        { "Data Input" = [
            "grammar/data/index.md",
            { "Eager Data Sources" = "grammar/data/eager.md" },
            { "Lazy Data Sources" = "grammar/data/lazy.md" },
            { "URL Templates and Multiple Files" = "grammar/data/multi-url.md" },
        ] },
        { "Transform" = [
            "grammar/transform/index.md",
            { "Aggregate" = "grammar/transform/aggregate.md" },
            { "AlignmentMismatches" = "grammar/transform/alignment-mismatches.md" },
            { "Collect" = "grammar/transform/collect.md" },
            { "Coverage" = "grammar/transform/coverage.md" },
            { "Filter" = "grammar/transform/filter.md" },
            { "FilterScoredLabels" = "grammar/transform/filter-scored-labels.md" },
            { "Flatten" = "grammar/transform/flatten.md" },
            { "FlattenCigar" = "grammar/transform/flatten-cigar.md" },
            { "FlattenCompressedExons" = "grammar/transform/flatten-compressed-exons.md" },
            { "FlattenDelimited" = "grammar/transform/flatten-delimited.md" },
            { "FlattenSequence" = "grammar/transform/flatten-sequence.md" },
            { "Formula" = "grammar/transform/formula.md" },
            { "LinearizeGenomicCoordinate" = "grammar/transform/linearize-genomic-coordinate.md" },
            { "Lookup" = "grammar/transform/lookup.md" },
            { "CoordinateLookup" = "grammar/transform/coordinate-lookup.md" },
            { "MeasureText" = "grammar/transform/measure-text.md" },
            { "Pileup" = "grammar/transform/pileup.md" },
            { "Project" = "grammar/transform/project.md" },
            { "RegexExtract" = "grammar/transform/regex-extract.md" },
            { "RegexFold" = "grammar/transform/regex-fold.md" },
            { "Sample" = "grammar/transform/sample.md" },
            { "Stack" = "grammar/transform/stack.md" },
            { "Window" = "grammar/transform/window.md" },
        ] },
        { "Graphical Marks" = [
            "grammar/mark/index.md",
            { "Arrow" = "grammar/mark/arrow.md" },
            { "Link" = "grammar/mark/link.md" },
            { "Point" = "grammar/mark/point.md" },
            { "Rect" = "grammar/mark/rect.md" },
            { "Rule" = "grammar/mark/rule.md" },
            { "Tick" = "grammar/mark/tick.md" },
            { "Text" = "grammar/mark/text.md" },
        ] },
        { "Conditional Encoding" = "grammar/conditional-encoding.md" },
        { "View Composition" = [
            "grammar/composition/index.md",
            { "Concat" = "grammar/composition/concat.md" },
            { "Layer" = "grammar/composition/layer.md" },
            { "Multiscale" = "grammar/composition/multiscale.md" },
        ] },
        { "Scales" = "grammar/scale.md" },
        { "Axes" = "grammar/axis.md" },
        { "Titles" = "grammar/title.md" },
        { "Legends" = "grammar/legend.md" },
        { "Config And Themes" = "grammar/config.md" },
        { "Importing Views" = "grammar/import.md" },
        { "Expressions" = "grammar/expressions.md" },
        { "Parameters" = "grammar/parameters.md" },
        { "Types" = "grammar/types.md" },
    ] },
    { "Working with Genomic Data" = [
        "genomic-data/index.md",
        { "Genomic Coordinates" = "genomic-data/genomic-coordinates.md" },
        { "Examples" = [
            "genomic-data/examples/index.md",
            { "Chromosome Ideogram from Cytobands" = "genomic-data/examples/cytobands.md" },
            { "Indexed FASTA Six-Frame Translation" = "genomic-data/examples/indexed-fasta-six-frame-translation.md" },
            { "RefSeq Gene Annotations with Scored Labels" = "genomic-data/examples/refseq-genes.md" },
            { "GENCODE Gene Annotations from GFF3" = "genomic-data/examples/gencode-gff3-gene-annotations.md" },
            { "ASCAT Copy-Number Segmentation" = "genomic-data/examples/ascat.md" },
            { "ASCAT Algorithm in GenomeSpy" = "genomic-data/examples/ascat-algorithm.md" },
            { "Sashimi plot from splice junctions" = "genomic-data/examples/sashimi-plot.md" },
            { "SPI1 Binding-QTL Dynseq Track" = "genomic-data/examples/dynseq-spi1-bqtl.md" },
            { "ClinVar Small-Variant Classifications" = "genomic-data/examples/clinvar-variants.md" },
            { "BAM Read Alignments" = "genomic-data/examples/bam-read-alignments.md" },
            { "Multiple Sequence Alignment" = "genomic-data/examples/multiple-sequence-alignment.md" },
        ] },
    ] },
    { "Working with Sample Collections" = [
        "sample-collections/index.md",
        { "Visualizing" = "sample-collections/visualizing.md" },
        { "Configuring Metadata Sources" = "sample-collections/metadata-sources.md" },
        { "Analyzing" = "sample-collections/analyzing.md" },
        { "Importing Metadata" = "sample-collections/importing-metadata.md" },
    ] },
    { "JavaScript API" = [
        "api/index.md",
        { "Embedding and Entry Points" = "api/embedding.md" },
        { "View Hierarchy" = "api/views.md" },
        { "Runtime State" = "api/runtime-state.md" },
        { "Inspector" = "api/inspector.md" },
        { "Instance, Events, and Export" = "api/instance.md" },
        { "Embed Options" = "api/embed-options.md" },
    ] },
    { "License" = "license.md" },
]

[project.theme]
logo = "img/bowtie.svg"
custom_dir = "custom_theme/"
features = [
    "navigation.indexes",
    "content.action.edit",
]
palette.primary = "indigo"
font.text = "Lato"

[project.markdown_extensions."markdown.extensions.def_list"]
[project.markdown_extensions."pymdownx.magiclink"]
[project.markdown_extensions."pymdownx.highlight"]
[project.markdown_extensions."pymdownx.superfences"]
[project.markdown_extensions."pymdownx.keys"]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions."pymdownx.emoji"]
[project.markdown_extensions.mdx_truly_sane_lists]
[project.markdown_extensions.genomespy_extension]
