# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
            - run: npm ci
            - run: npm run lint
            - run: npm --workspaces run test:tsc --if-present
            - run: npm -w @genome-spy/react-component run test
            - run: npm -w @genome-spy/embed-examples run test
            - run: npm -w @genome-spy/embed-examples run build:smoke
            - run: npm --workspaces run build --if-present
            - run: npm run test
