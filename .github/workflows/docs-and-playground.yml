name: Build and deploy docs and Playground

on:
    release:
        types: [released]
    workflow_dispatch:

concurrency:
    group: docs-and-playground-deploy
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            DEPLOY_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python 3.12
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Set up uv
              uses: astral-sh/setup-uv@v5

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev zlib1g-dev

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"

            - name: Install npm dependencies
              run: npm ci

            - name: Sync docs environment
              run: uv sync --group docs --locked

            - name: Build docs
              run: npm run build:docs

            - name: Build Playground
              run: npm -w @genome-spy/playground run build

            - name: Check out site repository
              uses: actions/checkout@v4
              with:
                  repository: genome-spy/genome-spy.github.io
                  ref: master
                  path: deploy-site
                  ssh-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

            - name: Update site contents
              run: |
                  rm -rf deploy-site/docs deploy-site/playground
                  mkdir -p deploy-site/docs deploy-site/playground
                  cp -R site/. deploy-site/docs/
                  cp -R packages/playground/dist/. deploy-site/playground/

            - name: Commit and push site update
              run: |
                  git -C deploy-site config user.name "github-actions[bot]"
                  git -C deploy-site config user.email "github-actions[bot]@users.noreply.github.com"
                  git -C deploy-site add docs playground
                  git -C deploy-site diff --cached --quiet && exit 0
                  git -C deploy-site commit -m "Deploy docs and playground (${DEPLOY_REF})"
                  git -C deploy-site push origin master
