<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>GenomeSpy Screenshot Harness</title>
        <style>
            :root {
                color-scheme: light;
                font-family: ui-sans-serif, system-ui, sans-serif;
                background: #f4f1ea;
                color: #1e1a17;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background:
                    radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 48%),
                    linear-gradient(180deg, #f8f6f2 0%, #ece7dc 100%);
            }

            main {
                width: min(92vw, 760px);
                display: grid;
                gap: 16px;
            }

            .meta {
                display: grid;
                gap: 6px;
            }

            .meta h1 {
                margin: 0;
                font-size: 1.1rem;
            }

            .meta p {
                margin: 0;
                font-size: 0.9rem;
                color: #61574f;
                overflow-wrap: anywhere;
            }

            #frame {
                width: 600px;
                height: 400px;
                background: white;
                border: 1px solid rgba(40, 28, 18, 0.12);
                box-shadow: 0 20px 50px rgba(55, 36, 20, 0.12);
                overflow: hidden;
            }

            #status {
                font-size: 0.88rem;
                color: #61574f;
            }
        </style>
    </head>
    <body>
        <main>
            <section class="meta">
                <h1>GenomeSpy Screenshot Harness</h1>
                <p id="spec-path"></p>
                <p id="status">Initializing…</p>
            </section>
            <div id="frame"></div>
        </main>
        <script type="module" src="/screenshotHarness.js"></script>
    </body>
</html>
