<!DOCTYPE html>
<html>
  <head>
    <title>GenomeSpy</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@genome-spy/app@{{APP_VERSION}}/dist/style.css"
    />
  </head>
  <body>
    <script type="module">
      import { embed } from "https://cdn.jsdelivr.net/npm/@genome-spy/app@{{APP_VERSION}}/dist/index.es.js";
      import { appInspector } from "https://cdn.jsdelivr.net/npm/@genome-spy/inspector@{{INSPECTOR_VERSION}}/dist/index.es.js";

      await embed(document.body, "spec.json", {
        plugins: [appInspector()],
      });
    </script>
  </body>
</html>
